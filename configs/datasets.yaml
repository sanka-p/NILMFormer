REDD:
  synth_aggregate_apps:
    - Fridge
    - Dishwasher
    - Microwave
    - WashingMachine
  # REDD exposes the combined washer/dryer meter under the WashingMachine channel.
  WasherDryer:
    app: !!str WashingMachine
    ind_house_train: [3, 5, 6]
    ind_house_valid: [4]
    ind_house_test: [1]
  Fridge:
    app: !!str Fridge
    ind_house_train: [3, 5, 6]
    ind_house_valid: [2]
    ind_house_test: [1]
  Dishwasher:
    app: !!str Dishwasher
    ind_house_train: [3, 4, 5, 6]
    ind_house_valid: [2]
    ind_house_test: [1]
  Microwave:
    app: !!str Microwave
    ind_house_train: [3, 5]
    ind_house_valid: [2]
    ind_house_test: [1]
  WashingMachine:
    app: !!str WashingMachine
    # Houses 2 & 5 have dead washer-dryer meters (flat ~8W); keep valid/test on
    # houses with real activations (h1, h3, h4).
    ind_house_train: [3, 5, 6]
    ind_house_valid: [4]
    ind_house_test: [1]
