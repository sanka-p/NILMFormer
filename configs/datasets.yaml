    app: !!str kettle
    ind_house_train: [1, 3, 4, 5]
    ind_house_valid: [1]
    ind_house_test: [2]
  Microwave:
    app: !!str microwave
    ind_house_train: [1, 3, 4, 5]
    ind_house_valid: [1]
    ind_house_test: [2]
  Fridge:
    app: !!str fridge
    ind_house_train: [1, 3, 4, 5]
